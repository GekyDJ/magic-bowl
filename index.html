<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glowing Bowl</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section>
        <div class="shadow"></div>
        <div class="bowl" id="bowl-container">
            <div class="liquid"></div>
        </div>
    </section>

    <script>
        function createBubble() {
            const container = document.getElementById('bowl-container');
            const bubble = document.createElement('span');
            bubble.classList.add('bubble');
            
            let minSize = 4;
            let maxSize = 15;

            // Adattamento per i cellulari
            if (window.innerWidth < 768) {
                minSize = 8;
                maxSize = 24;
            }

            let size = Math.random() * (maxSize - minSize) + minSize; 
            bubble.style.width = size + 'px';
            bubble.style.height = size + 'px';
            
            bubble.style.left = (Math.random() * 80 + 10) + '%';
            let duration = Math.random() * 2 + 2;
            bubble.style.animationDuration = duration + 's';
            
            container.appendChild(bubble);
            
            setTimeout(() => {
                bubble.remove();
            }, duration * 1000);
        }

        setInterval(createBubble, 180);
    </script>
</body>
</html>
