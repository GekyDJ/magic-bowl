<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <!-- Blocco totale di zoom e pinch -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#121212">
    <title>Glowing Liquid Bowl</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Section gestisce il cambio colore (hue-rotate) per tutta la scena -->
    <section>
        <!-- Wrapper usato per mantenere le proporzioni su mobile -->
        <div class="bowl-wrapper">
            <div class="shadow"></div>
            
            <div class="bowl">
                <div class="liquid"></div>
                <!-- Il contenitore delle bolle sta nella metà superiore -->
                <div class="bubbles-container"></div>
            </div>
        </div>
    </section>

    <script>
        const bubblesContainer = document.querySelector('.bubbles-container');

        function createBubble() {
            const bubble = document.createElement('div');
            bubble.classList.add('bubble'); 

            // Dimensioni e posizioni casuali
            const size = Math.random() * 8 + 4;
            bubble.style.width = `${size}px`;
            bubble.style.height = `${size}px`;
            bubble.style.left = `${Math.random() * 70 + 15}%`; // Centrate

            // Velocità di salita
            bubble.style.animationDuration = `${Math.random() * 2 + 3}s`;

            bubblesContainer.appendChild(bubble);

            setTimeout(() => {
                bubble.remove();
            }, 5000);
        }

        setInterval(createBubble, 300);
    </script>

</body>
</html>
